<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Chat - MAEMATH 2214</title>
    
    <link rel="stylesheet" href="css/style.css">
    
    <script type="module" src="js/guard.js"></script>
</head>
<body class="dashboard-body">

    <nav class="navbar">
        <div class="nav-brand">MAEMATH 2214</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="materials.html">Materials</a></li>
            <li><a href="reports.html">Reports</a></li>
            <li><a href="chat.html" class="active">Chat</a></li>
        </ul>
        <button id="logout-btn" class="btn-outline">Logout</button>
    </nav>

    <main class="dashboard-container">
        <header class="page-header" style="margin-bottom: 1.5rem;">
            <h1>Class Group Chat</h1>
            <p>Real-time discussion with your classmates.</p>
        </header>

        <div class="chat-container">
            <div class="chat-header">
                <span class="online-indicator"></span>
                <h2 class="chat-header-title">Live Discussion</h2>
            </div>
            
            <div id="chat-window">
                <p style="text-align: center; color: #94a3b8; font-size: 0.9rem; margin-top: 20px;">Loading conversation...</p>
            </div>
            
            <form id="chat-form" class="chat-input-area">
                <input type="text" id="message-input" placeholder="Type your message here..." autocomplete="off">
                <button type="submit" class="btn primary-btn send-btn">Send</button>
            </form>
        </div>
    </main>

    <script type="module" src="js/chat.js"></script>
    <script src="js/footer.js"></script>
</body>
</html>
